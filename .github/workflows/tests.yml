name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      # The runner needs an API token to import src.data_ingest, but the value
      # never actually hits the network (all API calls are mocked in tests).
      LICHESS_API_TOKEN: ci_placeholder_token
      # Skip the experiments.py clean-tree gate; CI checkouts are always clean
      # anyway and the tests that exercise the gate clear this var explicitly.
      SKIP_GIT_CHECK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        # Tests that need data/snapshot.db (full Lichess crawl, ~hours) skip
        # automatically via pytest.mark.skipif. The .pkl artifacts committed
        # under data/ are sufficient for the rest of the suite.
        run: pytest tests/ -v --tb=short
